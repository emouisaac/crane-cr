version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - crane_storage:/app/backend/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crane_credit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - crane_postgres:/var/lib/postgresql/data

volumes:
  crane_storage:
  crane_postgres:
